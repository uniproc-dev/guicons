name: Release IDE plugin

# Runs on every push to master that touches build.gradle.kts (where the
# plugin's own `version` lives) - publishing is idempotent (checks the
# Marketplace's update feed first and skips if that version's already
# there), so a push that doesn't bump `version` just no-ops instead of
# erroring. Bumping it and pushing is what actually ships a release.
# `workflow_dispatch` is a manual escape hatch with the same guard.
on:
  push:
    branches: [master]
    paths:
      - "ide-plugin/build.gradle.kts"
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    env:
      GUICONS_CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Read plugin version
        id: plugin_version
        shell: bash
        working-directory: ide-plugin
        run: echo "version=$(./gradlew properties -q | grep '^version:' | cut -d' ' -f2)" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already published
        id: check
        shell: bash
        env:
          VERSION: ${{ steps.plugin_version.outputs.version }}
        run: |
          feed=$(curl -s "https://plugins.jetbrains.com/plugins/list?pluginId=dev.guicons.idea-plugin")
          if echo "$feed" | grep -q "version=\"$VERSION\""; then
            echo "$VERSION is already on the Marketplace - skipping"
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify plugin project configuration
        if: steps.check.outputs.already_published == 'false'
        working-directory: ide-plugin
        run: ./gradlew verifyPluginProjectConfiguration --console=plain

      # Skipped entirely (not failed) when CERTIFICATE_CHAIN/PRIVATE_KEY
      # aren't set as repo secrets - self-signing is optional, JetBrains
      # signs the plugin itself on publish if you don't.
      - name: Sign plugin
        if: steps.check.outputs.already_published == 'false'
        working-directory: ide-plugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew signPlugin --console=plain

      - if: steps.check.outputs.already_published == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: guicons-plugin
          path: ide-plugin/build/distributions/*.zip

      - name: Publish to JetBrains Marketplace
        if: steps.check.outputs.already_published == 'false'
        working-directory: ide-plugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: ./gradlew publishPlugin --console=plain
