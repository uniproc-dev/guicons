name: Release IDE plugin

# Building+signing the zip runs automatically on a `plugin-v*` tag (so
# every tagged release always has a downloadable artifact attached to its
# GitHub Release, even before Marketplace review finishes) - but the
# actual `publishPlugin` step to JetBrains Marketplace is manual-approval
# gated via a GitHub Environment ("jetbrains-marketplace"), since that
# push is effectively irreversible (a version can't be un-published, only
# superseded). Configure that environment's required reviewers in this
# repo's Settings > Environments before relying on the gate.
on:
  push:
    tags: ["plugin-v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      GUICONS_CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Verify plugin project configuration
        working-directory: ide-plugin
        run: ./gradlew verifyPluginProjectConfiguration --console=plain

      - name: Sign plugin
        working-directory: ide-plugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew signPlugin --console=plain

      - uses: actions/upload-artifact@v4
        with:
          name: guicons-plugin
          path: ide-plugin/build/distributions/*.zip

      - if: startsWith(github.ref, 'refs/tags/plugin-v')
        name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ide-plugin/build/distributions/*.zip

  publish:
    needs: build
    runs-on: windows-latest
    # Requires manual approval through the "jetbrains-marketplace" GitHub
    # Environment - nothing publishes until a human clicks approve there.
    environment: jetbrains-marketplace
    env:
      GUICONS_CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Publish to JetBrains Marketplace
        working-directory: ide-plugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: ./gradlew publishPlugin --console=plain
